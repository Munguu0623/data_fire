services:
  api:
    build:
      context: ./model_ai
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./model_ai/data:/app/data:ro
      - ./model_ai/models:/app/models:ro
    env_file: .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
